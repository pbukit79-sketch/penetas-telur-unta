<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Penetas Telur </title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        
        /* Grid Layout */
        .grid-config { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        
        /* Status & Button */
        .status-box { font-weight: bold; padding: 10px; border-radius: 5px; text-align: center; margin-top: 10px; }
        .normal { background: #d4edda; color: #155724; }
        .bahaya { background: #f8d7da; color: #721c24; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.5; } }

        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-start { background: #27ae60; }
        .btn-stop { background: #c0392b; }
        .btn-save { background: #2980b9; margin-top: 10px; width: 100%; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ddd; text-align: center; padding: 12px; }
        th { background: #2c3e50; color: white; }
        
        canvas { max-height: 300px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Monitoring Penetas Telur</h2>

    <div class="grid-config">
        <!-- Control Panel -->
        <div class="card">
            <h3>Kontrol Alat</h3>
            <label>Set Interval (ms):</label>
            <input type="number" id="inputInterval" placeholder="Contoh: 5000">
            <button class="btn-save" onclick="updateInterval()">Update Interval</button>
            
            <div style="margin-top: 20px;">
                <label>Logging Data:</label>
                <button id="btnLog" class="btn-start" onclick="toggleLogging()">Memuat...</button>
            </div>
        </div>

        <!-- Real-time Status -->
        <div class="card">
            <h3>Kondisi Saat Ini</h3>
            <div id="statusAlat" class="status-box normal">Mengecek Sensor...</div>
            <p>Suhu: <span id="txtTemp">--</span> °C</p>
            <p>Kelembapan: <span id="txtHum">--</span> %</p>
        </div>
    </div>

    <!-- Grafik -->
    <canvas id="tempChart"></canvas>

    <!-- Tabel Monitoring -->
    <h3>Log Data Terakhir</h3>
    <table id="dataTable">
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Suhu (°C)</th>
                <th>Kelembapan (%)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://penetas-telur-2a65a-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Inisialisasi Grafik dengan Dua Dataset (Suhu & Kelembapan)
    const ctx = document.getElementById('tempChart').getContext('2d');
    const tempChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                {
                    label: 'Suhu (°C)',
                    borderColor: '#e67e22',
                    data: [],
                    fill: false,
                    yAxisID: 'y'
                },
                {
                    label: 'Kelembapan (%)',
                    borderColor: '#3498db',
                    data: [],
                    fill: false,
                    yAxisID: 'y1'
                }
            ]
        },
        options: {
            scales: {
                y: { type: 'linear', position: 'left', title: { display: true, text: 'Suhu' } },
                y1: { type: 'linear', position: 'right', title: { display: true, text: 'Lembab' }, grid: { drawOnChartArea: false } }
            }
        }
    });

    // 1. Baca Data Sensor & Update Tabel/Grafik
    db.ref('/Sensor/Data').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            const time = new Date().toLocaleTimeString();
            document.getElementById('txtTemp').innerText = data.temperature;
            document.getElementById('txtHum').innerText = data.humidity;

            // Kondisi Khusus (Alarm)
            const statusBox = document.getElementById('statusAlat');
            if(data.temperature > 39 || data.temperature < 35) {
                statusBox.innerText = "!!! KONDISI BAHAYA !!!";
                statusBox.className = "status-box bahaya";
            } else {
                statusBox.innerText = "KONDISI NORMAL";
                statusBox.className = "status-box normal";
            }

            // Update Tabel (Maksimal 5 baris)
            const table = document.getElementById('tableBody');
            const row = table.insertRow(0);
            row.innerHTML = `<td>${time}</td><td>${data.temperature}</td><td>${data.humidity}</td>`;
            if(table.rows.length > 5) table.deleteRow(5);

            // Update Grafik
            tempChart.data.labels.push(time);
            tempChart.data.datasets[0].data.push(data.temperature);
            tempChart.data.datasets[1].data.push(data.humidity);
            
            if(tempChart.data.labels.length > 10) {
                tempChart.data.labels.shift();
                tempChart.data.datasets[0].data.shift();
                tempChart.data.datasets[1].data.shift();
            }
            tempChart.update();
        }
    });

    // 2. Kontrol Interval
    function updateInterval() {
        const newVal = document.getElementById('inputInterval').value;
        if(newVal) {
            db.ref('/Control').update({ interval: parseInt(newVal) });
            alert("Interval diperbarui ke: " + newVal + " ms");
        }
    }

    // 3. Start/Stop Logging
    let currentLogging = false;
    db.ref('/Control/logging').on('value', (snapshot) => {
        currentLogging = snapshot.val();
        const btn = document.getElementById('btnLog');
        btn.innerText = currentLogging ? "STOP LOGGING" : "START LOGGING";
        btn.className = currentLogging ? "btn-stop" : "btn-start";
    });

    function toggleLogging() {
        db.ref('/Control').update({ logging: !currentLogging });
    }
</script>

</body>
</html>
