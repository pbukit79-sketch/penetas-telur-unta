<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Incubator Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; }
        body { font-family: sans-serif; background: #ecf0f1; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-start { background: var(--accent); }
        .btn-stop { background: #e74c3c; }
        input { padding: 8px; width: 80px; }
    </style>
</head>
<body>

    <h2>Monitoring & Control Penetas Telur</h2>

    <div class="grid">
        <!-- 1. Grafik -->
        <div class="card">
            <h3>Grafik Real-time</h3>
            <canvas id="myChart"></canvas>
        </div>

        <!-- 2. Setting & Control -->
        <div class="card">
            <h3>Control Panel</h3>
            <p>Suhu: <span id="txt-temp">--</span>°C | Lembab: <span id="txt-hum">--</span>%</p>
            <hr>
            <label>Interval (ms): </label>
            <input type="number" id="input-interval" value="5000">
            <button class="btn" style="background:#3498db" onclick="updateInterval()">Set Interval</button>
            <br><br>
            <button id="btn-log" class="btn btn-start" onclick="toggleLogging()">Logging: ON</button>
        </div>

        <!-- 3. Tabel -->
        <div class="card" style="grid-column: span 2;">
            <h3>Riwayat Data</h3>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Suhu (°C)</th>
                        <th>Kelembapan (%)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAdXkj50DFjpO41EXGcpTIzNIkeSZpO6r0",
        databaseURL: "https://penetas-telur-2a65a-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Chart Setup
    const ctx = document.getElementById('myChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Suhu', data: [], borderColor: 'red' }, { label: 'Humid', data: [], borderColor: 'blue' }] }
    });

    let loggingStatus = true;

    // Read Data
    db.ref('Sensor').on('value', snap => {
        const data = snap.val();
        document.getElementById('txt-temp').innerText = data.temperature;
        document.getElementById('txt-hum').innerText = data.humidity;

        // Update Table
        const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${data.temperature}</td><td>${data.humidity}</td></tr>`;
        const tbody = document.querySelector('#data-table tbody');
        tbody.insertAdjacentHTML('afterbegin', row);

        // Update Chart
        if(myChart.data.labels.length > 10) { myChart.data.labels.shift(); myChart.data.datasets[0].data.shift(); myChart.data.datasets[1].data.shift(); }
        myChart.data.labels.push(new Date().toLocaleTimeString());
        myChart.data.datasets[0].data.push(data.temperature);
        myChart.data.datasets[1].data.push(data.humidity);
        myChart.chart.update();
    });

    // Control Functions
    function updateInterval() {
        const val = document.getElementById('input-interval').value;
        db.ref('Control').update({ interval: parseInt(val) });
        alert("Interval diperbarui!");
    }

    function toggleLogging() {
        loggingStatus = !loggingStatus;
        db.ref('Control').update({ logging: loggingStatus });
        const btn = document.getElementById('btn-log');
        btn.innerText = loggingStatus ? "Logging: ON" : "Logging: OFF";
        btn.className = loggingStatus ? "btn btn-start" : "btn btn-stop";
    }
</script>
</body>
</html>
