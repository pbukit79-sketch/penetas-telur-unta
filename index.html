<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Incubator Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; }
        body { font-family: sans-serif; background: #ecf0f1; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-start { background: var(--accent); }
        .btn-stop { background: #e74c3c; }
        input { padding: 8px; width: 80px; }
    </style>
</head>
<body>

    <h2>Monitoring & Control Penetas Telur</h2>

    <div class="grid">
        <!-- 1. Grafik -->
        <div class="card">
            <h3>Grafik Real-time</h3>
            <canvas id="myChart"></canvas>
        </div>

        <!-- 2. Setting & Control -->
        <div class="card">
            <h3>Control Panel</h3>
            <p>Suhu: <span id="txt-temp">--</span>°C | Lembab: <span id="txt-hum">--</span>%</p>
            <hr>
            <label>Interval (ms): </label>
            <input type="number" id="input-interval" value="5000">
            <button class="btn" style="background:#3498db" onclick="updateInterval()">Set Interval</button>
            <br><br>
            <button id="btn-log" class="btn btn-start" onclick="toggleLogging()">Logging: ON</button>
        </div>

        <!-- 3. Tabel -->
        <div class="card" style="grid-column: span 2;">
            <h3>Riwayat Data</h3>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Suhu (°C)</th>
                        <th>Kelembapan (%)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAdXkj50DFjpO41EXGcpTIzNIkeSZpO6r0",
        databaseURL: "https://penetas-telur-2a65a-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Inisialisasi Chart.js dengan benar
    const ctx = document.getElementById('myChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                {
                    label: 'Suhu (°C)',
                    data: [],
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.1)',
                    fill: true,
                    tension: 0.3
                },
                {
                    label: 'Lembab (%)',
                    data: [],
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    fill: true,
                    tension: 0.3
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: false }
            }
        }
    });

    let loggingStatus = true;

    // 2. Membaca Data Real-time
    db.ref('Sensor').on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const temp = data.temperature;
        const hum = data.humidity;
        const time = new Date().toLocaleTimeString();

        // Update Teks Monitoring
        document.getElementById('txt-temp').innerText = temp;
        document.getElementById('txt-hum').innerText = hum;

        // Update Tabel (Maksimal 10 baris agar tidak penuh)
        const tbody = document.querySelector('#data-table tbody');
        const row = `<tr><td>${time}</td><td>${temp}</td><td>${hum}</td></tr>`;
        tbody.insertAdjacentHTML('afterbegin', row);
        if (tbody.rows.length > 10) tbody.deleteRow(10);

        // --- PERBAIKAN GRAFIK DI SINI ---
        // Tambahkan data baru
        myChart.data.labels.push(time);
        myChart.data.datasets[0].data.push(temp);
        myChart.data.datasets[1].data.push(hum);

        // Batasi jumlah titik di grafik (misal hanya 10 titik terakhir)
        if (myChart.data.labels.length > 10) {
            myChart.data.labels.shift();
            myChart.data.datasets[0].data.shift();
            myChart.data.datasets[1].data.shift();
        }

        // Gunakan .update() bukan .chart.update()
        myChart.update();
    });

    // 3. Fungsi Kontrol
    function updateInterval() {
        const val = document.getElementById('input-interval').value;
        db.ref('Control').update({ interval: parseInt(val) })
          .then(() => alert("Interval berhasil diubah ke " + val + " ms"));
    }

    function toggleLogging() {
        loggingStatus = !loggingStatus;
        db.ref('Control').update({ logging: loggingStatus });
        const btn = document.getElementById('btn-log');
        btn.innerText = loggingStatus ? "Logging: ON" : "Logging: OFF";
        btn.className = loggingStatus ? "btn btn-start" : "btn btn-stop";
    }
</script>
</body>
</html>
